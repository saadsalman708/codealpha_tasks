<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookify play</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">

        <main>
            <div class="main-body">
                <div class="play-box">

                <div class="img-display-container">
                    <div class="imgg"></div>
                    <div class="bg-blur-display">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>

                <div>
                    <div>
                        <h2 id="title">title</h2>
                        <span id="artist">artist</span>
                    </div>

                    <audio id="audioTag" src="" type="audio/mpeg"></audio>
                    <!-- <audio controls>
                        <source type="audio/mp4" src="https://www.jiosaavn.com/album/pal-pal-talwiinder-verse/v4aj0bqS9Ow_160.mp4">
                    </audio> -->

                    <div class="pB">
                        <div id="progressBarContainer">
                            <div id="progressBar"></div>
                        </div>
                        <div>
                            <span id="currentDuration">00:00</span>/<span id="duration"></span>
                        </div>
                    </div>

                    <div class="btns">
                        <button id="replayBtn">Replay</button>
                        <button id="pervBtn">Previous</button>
                        <button id="playStopBtn">Play</button>
                        <button id="nextBtn">Next</button>
                    </div>
                </div>

                <div id="volumnBarContainer">
                    <div id="volumnBar"></div>
                </div>
            </div>
            
            
            <div id="playListContainer">
                <div>
                    <span>
                        shuffle playlist
                        <button id="shuffleBtn">shuffle</button>
                    </span>
                </div>
                <div id="playListBox"></div>
            </div>
        </div>
        </main>

    </div>
</body>
<script src="./app.js"></script>

</html>
